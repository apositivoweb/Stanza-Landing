    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(26,26,24,0.55) 0%,
      rgba(26,26,24,0.72) 50%,
      rgba(26,26,24,0.88) 100%
    );
  }

  /* ─── Logo top center ─── */
  .logo-wrap {
    position: absolute;
    top: 40px; left: 0; right: 0;
    display: flex; justify-content: center;
    z-index: 2;
  }
  .logo-wrap img {
    height: 80px; width: auto;
    filter: drop-shadow(0 2px 12px rgba(0,0,0,0.5));
  }

  /* ─── Content ─── */
  .content {
    position: relative; z-index: 2;
    text-align: center;
    padding: 32px 40px;
    max-width: 680px;
  }
  .check-circle {
    width: 72px; height: 72px;
    border: 2px solid #bcbf42;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 32px;
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }
  .check-circle svg {
    width: 32px; height: 32px;
    stroke: #bcbf42; fill: none;
    stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
  }
  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  .eyebrow {
    font-size: 0.65rem; letter-spacing: 0.32em; text-transform: uppercase;
    color: #bcbf42; font-weight: 600; margin-bottom: 20px;
  }
  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    font-weight: 300; line-height: 1.1;
    color: #ffffff; margin-bottom: 24px;
  }
  .headline strong { font-weight: 600; }
  .copy {
    font-size: 1.05rem;
    color: rgba(240,234,210,0.78);
    font-weight: 300; line-height: 1.75;
    max-width: 480px; margin: 0 auto 44px;
  }
  .divider {
    width: 48px; height: 1px;
    background: rgba(188,191,66,0.4);
    margin: 0 auto 44px;
  }
  .back-link {
    display: inline-block;
    font-size: 0.75rem; font-weight: 600;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: #1a1a18; background: #bcbf42;
    padding: 13px 32px; text-decoration: none;
    transition: background 0.22s, color 0.22s;
  }
  .back-link:hover { background: #f0ead2; }

  /* ─── Footer strip ─── */
  .footer-strip {
    position: absolute; bottom: 32px; left: 0; right: 0;
    z-index: 2; text-align: center;
    font-size: 0.65rem; color: rgba(240,234,210,0.28);
    letter-spacing: 0.1em;
  }
  .footer-strip strong { color: #bcbf42; }

  @media (max-width: 600px) {
    .logo-wrap img { height: 60px; }
    .content { padding: 24px 28px; }
    .check-circle { width: 60px; height: 60px; margin-bottom: 24px; }
  }
</style>
</head>

<div class="hero">
